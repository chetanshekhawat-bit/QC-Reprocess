<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Reprocess Dashboard</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
        }

        .kpi-card {
            border: 1px solid #e2e8f0;
            animation: slideIn 0.6s ease-out forwards;
            opacity: 0;
        }

        .kpi-card:nth-child(1) {
            animation-delay: 0s;
        }

        .kpi-card:nth-child(2) {
            animation-delay: 0.15s;
        }

        .kpi-card:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
    <script src="/_sdk/resizing_sdk.js" type="text/javascript"></script>
</head>

<body data-template-id="__page-root" class="min-h-screen p-4 md:p-8 bg-slate-100">
    <header class="mb-6">
        <h1 data-template-id="page-title" class="canva-text text-2xl font-bold text-slate-900">QC Reprocess Dashboard
        </h1>
    </header>
    <main>
        <div class="mb-8">
            <h2 data-template-id="section-last3" class="canva-text font-semibold mb-3 text-slate-700">Last 3 Months
                (Feb–Apr 2026)</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <div data-template-id="kpi-l3-done" class="canva-card kpi-card rounded-lg p-4 bg-white"
                    style="border-left:4px solid #3b82f6">
                    <p data-template-id="kpi-l3-done-label"
                        class="canva-text text-xs uppercase tracking-wide text-gray-500">Avg QC Done</p>
                    <p class="text-2xl font-bold text-gray-900 mt-1" id="kpi-l3-done-value">—</p>
                </div>
                <div data-template-id="kpi-l3-reprocess" class="canva-card kpi-card rounded-lg p-4 bg-white"
                    style="border-left:4px solid #ef4444">
                    <p data-template-id="kpi-l3-reprocess-label"
                        class="canva-text text-xs uppercase tracking-wide text-gray-500">Avg QC Reprocess</p>
                    <p class="text-2xl font-bold text-gray-900 mt-1" id="kpi-l3-reprocess-value">—</p>
                </div>
                <div data-template-id="kpi-l3-avg-reprocess" class="canva-card kpi-card rounded-lg p-4 bg-white"
                    style="border-left:4px solid #f59e0b">
                    <p data-template-id="kpi-l3-avg-label"
                        class="canva-text text-xs uppercase tracking-wide text-gray-500">Avg Reprocess Rate</p>
                    <p class="text-2xl font-bold text-gray-900 mt-1" id="kpi-l3-avg-reprocess-value">—</p>
                </div>
            </div>
        </div>
        <div data-template-id="chart-section" class="canva-section bg-white rounded-xl p-4 md:p-6 shadow-sm">
            <h2 data-template-id="chart-title" class="canva-text font-semibold mb-4 text-slate-900">QC Done &amp;
                Reprocess vs Avg Reprocess (Feb–Apr 2026)</h2>
            <div style="height: 280px;">
                <canvas id="mixedChart"></canvas>
            </div>
        </div>

        <div data-template-id="client-chart-section" class="canva-section bg-white rounded-xl p-4 shadow-sm mt-8">
            <h2 data-template-id="client-chart-title" class="canva-text font-semibold mb-3 text-slate-900">Reprocess
                Rate By Top-20 Clients (Feb–Apr 2026)</h2>
            <div class="overflow-x-auto relative rounded border border-slate-200">
                <div id="heatmapTableContainer" class="w-full"></div>
            </div>
        </div>

        <div data-template-id="pareto-chart-section" class="canva-section bg-white rounded-xl p-4 shadow-sm mt-8 mb-4">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                <h2 id="paretoChartTitle" class="canva-text font-semibold text-slate-900">Top 20 Reprocess Remarks – All
                    Clients</h2>
                <div class="relative">
                    <select id="clientFilter"
                        class="appearance-none bg-slate-50 border border-slate-300 text-slate-700 py-1.5 pl-3 pr-8 rounded leading-tight focus:outline-none focus:bg-white focus:border-blue-500 text-sm font-medium shadow-sm cursor-pointer">
                        <option value="All Clients">All Top-20 Clients</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-500">
                        <i data-lucide="chevron-down" class="h-4 w-4"></i>
                    </div>
                </div>
            </div>
            <div class="relative w-full" style="height: 500px;">
                <canvas id="paretoChart"></canvas>
            </div>
        </div>
    </main>
    <script src="/_sdk/editing_sdk.js"></script>
    <script>
        Chart.register(ChartDataLabels);

        Papa.parse('data.csv', {
            download: true,
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: function (results) {
                const data = results.data;
                if (data.length === 0) return;

                // Extract historical data
                // Assuming data is ordered chronologically
                const last3Months = data.slice(Math.max(0, data.length - 3));

                // Update Headers dynamically
                const last3MonthsLabels = last3Months.map(d => d.Month);
                const last3Text = last3MonthsLabels.length > 0 ? `(${last3MonthsLabels[0]} - ${last3MonthsLabels[last3MonthsLabels.length - 1]})` : '';

                const allMonthsLabels = data.map(d => d.Month);
                const allMonthsText = allMonthsLabels.length > 0 ? `(${allMonthsLabels[0]} - ${allMonthsLabels[allMonthsLabels.length - 1]})` : '';

                document.querySelector('[data-template-id="section-last3"]').textContent = `Last ${last3Months.length} Months ${last3Text}`;
                document.querySelector('[data-template-id="chart-title"]').textContent = `QC Done & Reprocess vs Avg Reprocess ${last3Text}`;
                document.querySelector('[data-template-id="client-chart-title"]').textContent = `Reprocess Rate By Top-20 Clients ${allMonthsText}`;



                // Calculate averages for Last 3 Months
                if (last3Months.length > 0) {
                    const avgQCDone = Math.round(last3Months.reduce((s, d) => s + (d['Total QC Done'] || 0), 0) / last3Months.length);
                    const avgQCReprocess = Math.round(last3Months.reduce((s, d) => s + (d['QC Reprocess'] || 0), 0) / last3Months.length);
                    const avgReprocess = (last3Months.reduce((s, d) => s + (d['Avg Reprocess'] || 0), 0) / last3Months.length).toFixed(1);

                    document.getElementById('kpi-l3-done-value').textContent = avgQCDone.toLocaleString('en-IN');
                    document.getElementById('kpi-l3-reprocess-value').textContent = avgQCReprocess.toLocaleString('en-IN');
                    document.getElementById('kpi-l3-avg-reprocess-value').textContent = avgReprocess;
                } else {
                    document.getElementById('kpi-l3-done-value').textContent = '—';
                    document.getElementById('kpi-l3-reprocess-value').textContent = '—';
                    document.getElementById('kpi-l3-avg-reprocess-value').textContent = '—';
                }



                // Render Mixed Chart
                new Chart(document.getElementById('mixedChart').getContext('2d'), {
                    type: 'bar',
                    data: {
                        labels: last3Months.map(d => d.Month),
                        datasets: [
                            { label: 'QC Done', data: last3Months.map(d => d['Total QC Done']), backgroundColor: '#3b82f6', type: 'bar', yAxisID: 'y', order: 2 },
                            { label: 'QC Reprocess', data: last3Months.map(d => d['QC Reprocess']), backgroundColor: '#ef4444', type: 'bar', yAxisID: 'y', order: 2 },
                            { label: 'Avg Reprocess', data: last3Months.map(d => d['Avg Reprocess']), borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.1)', type: 'line', yAxisID: 'y1', order: 1, borderWidth: 2, tension: 0.4, pointRadius: 5, pointBackgroundColor: '#f59e0b', pointBorderColor: '#fff', pointBorderWidth: 2 }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { position: 'top', labels: { usePointStyle: true, padding: 15 } },
                            datalabels: { display: true, anchor: 'end', align: 'top', font: { size: 11, weight: 'bold' }, color: function (ctx) { return ctx.datasetIndex === 2 ? '#f59e0b' : '#1e293b'; }, formatter: function (value, ctx) { return ctx.datasetIndex === 2 ? (value || 0).toFixed(1) : (value || 0).toLocaleString('en-IN'); } }
                        },
                        scales: {
                            y: { type: 'linear', position: 'left', title: { display: true, text: 'QC / Reprocess Count', font: { weight: 'bold' } }, ticks: { callback: v => v.toLocaleString('en-IN') }, grid: { drawOnChartArea: false } },
                            y1: { type: 'linear', position: 'right', title: { display: true, text: 'Avg Reprocess', font: { weight: 'bold' } }, grid: { drawOnChartArea: false } }
                        }
                    }
                });

                // Extract Clients list preserving CSV order (ignoring fixed columns)
                const ignoreCols = ['Month', 'Total QC Done', 'QC Reprocess', 'Avg Reprocess'];
                // We grab the keys from the first row and filter out the ignored columns
                const clients = Object.keys(data[0]).filter(key => !ignoreCols.includes(key));

                // Calculate the average for each client across all months
                const clientAverages = clients.map(c => {
                    let sum = 0, count = 0;
                    data.forEach(d => { if (d[c] != null && d[c] !== '') { sum += d[c]; count++; } });
                    return count > 0 ? (sum / count).toFixed(1) : null;
                });

                // Find min and max for heatmap coloring
                let minVal = Infinity;
                let maxVal = -Infinity;
                clients.forEach(c => {
                    data.forEach(d => {
                        let val = d[c];
                        if (val != null && val !== '') {
                            if (val < minVal) minVal = val;
                            if (val > maxVal) maxVal = val;
                        }
                    });
                });

                // Calculate base for heatmap (Avg Reprocess Rate)
                const baseAvgReprocess = last3Months.length > 0
                    ? last3Months.reduce((s, d) => s + (d['Avg Reprocess'] || 0), 0) / last3Months.length
                    : (minVal + maxVal) / 2;

                function getHeatmapColor(val, min, max, base) {
                    if (val == null || val === '') return '';
                    let ratio;
                    if (val > base) {
                        ratio = 0.5 + 0.5 * ((val - base) / (max - base || 1));
                    } else if (val < base) {
                        ratio = 0.5 * ((val - min) / (base - min || 1));
                    } else {
                        ratio = 0.5;
                    }
                    if (ratio >= 0.8) return 'bg-red-200 text-slate-900';
                    if (ratio > 0.5) return 'bg-red-100 text-slate-900';
                    if (ratio === 0.5) return 'bg-yellow-100 text-slate-900';
                    if (ratio >= 0.2) return 'bg-green-100 text-slate-900';
                    return 'bg-green-200 text-slate-900';
                }

                let tableHtml = '<table class="min-w-full text-xs text-left text-slate-700 border-collapse border-slate-200"> <thead class="text-[10px] text-slate-700 uppercase bg-slate-100 sticky top-0 z-20 shadow-[0_1px_0_0_#e2e8f0]"> <tr> <th scope="col" class="px-2 py-1.5 border-r border-slate-200 sticky left-0 top-0 bg-slate-100 z-30 w-80 shadow-[1px_0_0_0_#e2e8f0]">Client</th>';

                data.forEach(d => {
                    tableHtml += `<th scope="col" class="px-2 py-1.5 text-center border-r border-slate-200 min-w-[60px]">${d.Month}</th>`;
                });
                tableHtml += `<th scope="col" class="px-2 py-1.5 text-center bg-slate-100 font-bold min-w-[60px]">Avg</th></tr></thead><tbody>`;

                clients.forEach((c, idx) => {
                    tableHtml += `<tr class="border-b border-slate-200 bg-white hover:bg-slate-50">`;
                    tableHtml += `<td class="px-2 py-1 font-medium text-slate-900 border-r border-slate-200 sticky left-0 bg-white shadow-[1px_0_0_0_#e2e8f0] truncate max-w-[320px]" title="${c}">${c}</td>`;

                    data.forEach(d => {
                        let val = d[c];
                        let cellContent = val != null && val !== '' ? Number(val).toFixed(1) : '-';
                        let colorClass = val != null && val !== '' ? getHeatmapColor(val, minVal, maxVal, baseAvgReprocess) : '';

                        tableHtml += `<td class="px-2 py-1 text-center border-r border-slate-200 ${colorClass}">${cellContent}</td>`;
                    });

                    // Add average column
                    let avgVal = clientAverages[idx];
                    let avgContent = avgVal !== null ? avgVal : '-';
                    tableHtml += `<td class="px-2 py-1 text-center font-bold bg-slate-50 text-slate-900 border-l border-slate-200">${avgContent}</td>`;

                    tableHtml += `</tr>`;
                });

                tableHtml += '</tbody></table>';

                document.getElementById('heatmapTableContainer').innerHTML = tableHtml;
                // Render Pareto Chart
                Papa.parse('pareto_data_backend.csv', {
                    download: true,
                    header: true,
                    dynamicTyping: true,
                    skipEmptyLines: true,
                    complete: function (paretoResults) {
                        const paretoData = paretoResults.data;
                        if (paretoData.length === 0) return;

                        // Identify unique clients for the dropdown
                        const clientsSet = new Set();
                        paretoData.forEach(row => {
                            if (row['Top Clients']) {
                                clientsSet.add(row['Top Clients']);
                            }
                        });
                        const clients = Array.from(clientsSet).sort();

                        const clientSelect = document.getElementById('clientFilter');
                        clients.forEach(client => {
                            const option = document.createElement('option');
                            option.value = client;
                            option.textContent = client;
                            clientSelect.appendChild(option);
                        });

                        // Re-initialize Lucide icons if needed for the chevron
                        if (window.lucide) {
                            lucide.createIcons();
                        }

                        let paretoChartInstance = null;

                        // Optional mapping for unstructured remarks to understandable labels
                        // You can add your raw/messy data strings here to map them to clean categories
                        const REMARK_MAPPING = {
                            "Visible profile picture is missing or unclear": "Visible profile picture missing",
                            "Name on PAN card does not match": "Name mismatch (PAN)",
                            "Photo is poor quality": "Poor profile picture",
                            "Exp letter missing": "Experience letter missing",
                            "Relieving letter not provided": "Relieving letter missing"
                        };

                        // Helper function to clean and map remarks
                        function getCleanRemark(rawRemark) {
                            if (!rawRemark) return "Unknown";
                            const clean = String(rawRemark).trim();
                            // Return the mapped version if it exists, otherwise return the cleaned raw string
                            return REMARK_MAPPING[clean] || clean;
                        }

                        function renderParetoChart(selectedClient) {
                            // Filter data
                            let filteredData = paretoData;
                            if (selectedClient !== 'All Clients') {
                                filteredData = paretoData.filter(row => row['Top Clients'] === selectedClient);
                            }

                            // Aggregate Total by Reprocess Remarks (using mapping logic)
                            const aggregated = {};
                            filteredData.forEach(row => {
                                const rawRemark = row['Reprocess Remarks'];
                                const cleanRemark = getCleanRemark(rawRemark);
                                const total = row['Total'] || 0;
                                if (cleanRemark !== "Unknown") {
                                    aggregated[cleanRemark] = (aggregated[cleanRemark] || 0) + total;
                                }
                            });

                            // Convert to array, sort, and get Top 20
                            let aggregatedArray = Object.keys(aggregated).map(remark => ({
                                remark: remark,
                                total: aggregated[remark]
                            }));

                            aggregatedArray.sort((a, b) => b.total - a.total);
                            aggregatedArray = aggregatedArray.slice(0, 20);

                            // Calculate cumulative percentages
                            const totalSum = aggregatedArray.reduce((sum, item) => sum + item.total, 0);
                            let currentSum = 0;
                            const chartLabels = [];
                            const chartDataTotals = [];
                            const chartDataCumulative = [];

                            aggregatedArray.forEach(item => {
                                currentSum += item.total;
                                const cumulativePercentage = totalSum > 0 ? (currentSum / totalSum) * 100 : 0;
                                chartLabels.push(item.remark);
                                chartDataTotals.push(item.total);
                                chartDataCumulative.push(cumulativePercentage);
                            });

                            // Update Chart Title
                            document.getElementById('paretoChartTitle').textContent = `Top 20 Reprocess Remarks – ${selectedClient}`;

                            // Render or Update Chart
                            const ctx = document.getElementById('paretoChart').getContext('2d');

                            if (paretoChartInstance) {
                                paretoChartInstance.destroy();
                            }

                            paretoChartInstance = new Chart(ctx, {
                                type: 'bar',
                                data: {
                                    labels: chartLabels,
                                    datasets: [
                                        {
                                            label: 'Total Count',
                                            data: chartDataTotals,
                                            backgroundColor: '#3b82f6',
                                            type: 'bar',
                                            yAxisID: 'y',
                                            order: 2
                                        },
                                        {
                                            label: 'Cumulative %',
                                            data: chartDataCumulative,
                                            borderColor: '#ef4444',
                                            backgroundColor: '#ef4444',
                                            type: 'line',
                                            yAxisID: 'y1',
                                            order: 1,
                                            borderWidth: 2,
                                            tension: 0.1,
                                            pointRadius: 3
                                        }
                                    ]
                                },
                                options: {
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    interaction: { mode: 'index', intersect: false },
                                    plugins: {
                                        legend: { position: 'top', labels: { usePointStyle: true, padding: 15 } },
                                        datalabels: {
                                            display: true,
                                            font: { size: 9, weight: 'bold' },
                                            formatter: function (value, ctx) {
                                                if (ctx.datasetIndex === 0) {
                                                    return value.toLocaleString('en-IN');
                                                }
                                                return Math.round(value) + '%';
                                            },
                                            align: function (ctx) {
                                                return ctx.datasetIndex === 0 ? 'top' : 'bottom';
                                            },
                                            anchor: function (ctx) {
                                                return ctx.datasetIndex === 0 ? 'end' : 'center';
                                            },
                                            color: function (ctx) {
                                                if (ctx.datasetIndex === 0) return '#1e293b';
                                                return '#ef4444';
                                            }
                                        }
                                    },
                                    scales: {
                                        x: {
                                            ticks: {
                                                autoSkip: false,
                                                maxRotation: 90,
                                                minRotation: 90,
                                                font: { size: 10 }
                                            },
                                            grid: { display: false }
                                        },
                                        y: {
                                            type: 'linear',
                                            position: 'left',
                                            title: { display: true, text: 'Total Count', font: { weight: 'bold', size: 11 } },
                                            grid: { drawOnChartArea: false },
                                            beginAtZero: true
                                        },
                                        y1: {
                                            type: 'linear',
                                            position: 'right',
                                            title: { display: true, text: 'Cumulative %', font: { weight: 'bold', size: 11 } },
                                            min: 0,
                                            max: 100,
                                            grid: { drawOnChartArea: false },
                                            ticks: {
                                                callback: function (value) { return value + '%' }
                                            }
                                        }
                                    }
                                }
                            });
                        }

                        // Initial render
                        renderParetoChart('All Clients');

                        // Handle filter change
                        clientSelect.addEventListener('change', function (e) {
                            renderParetoChart(e.target.value);
                        });
                    }
                });

            }
        });
    </script>
